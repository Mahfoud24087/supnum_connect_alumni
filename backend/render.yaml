services:
  - type: web
    name: supnum-connect-api
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: supnum-connect-db
          property: connectionString

databases:
  - name: supnum-connect-db
    databaseName: supnum_connect
    user: supnum_admin
    plan: free
